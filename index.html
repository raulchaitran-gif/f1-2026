<!-- Favicon: F1 chequered flag as inline SVG → data URI -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23E8002D'/%3E%3Ctext x='16' y='23' font-size='20' text-anchor='middle' font-family='Arial'>🏁%3C/text%3E%3C/svg%3E">
<!-- Fallback PNG favicon generated via canvas at runtime -->
<script>
(function(){
  const c = document.createElement('canvas');
  c.width = c.height = 64;
  const ctx = c.getContext('2d');
  // Red rounded square bg
  ctx.fillStyle = '#E8002D';
  const r = 12;
  ctx.beginPath();
  ctx.moveTo(r,0); ctx.lineTo(64-r,0); ctx.quadraticCurveTo(64,0,64,r);
  ctx.lineTo(64,64-r); ctx.quadraticCurveTo(64,64,64-r,64);
  ctx.lineTo(r,64); ctx.quadraticCurveTo(0,64,0,64-r);
  ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0);
  ctx.closePath(); ctx.fill();
  // Chequered flag pattern (4x4 squares)
  const sq = 8, cols = 4, rows = 4;
  const ox = 16, oy = 14;
  for(let row=0;row<rows;row++){
    for(let col=0;col<cols;col++){
      ctx.fillStyle = (row+col)%2===0 ? '#ffffff' : '#000000';
      ctx.fillRect(ox+col*sq, oy+row*sq, sq, sq);
    }
  }
  // Red border over chequered
  ctx.strokeStyle='rgba(0,0,0,0.25)'; ctx.lineWidth=1;
  ctx.strokeRect(ox, oy, sq*cols, sq*rows);
  const link = document.createElement('link');
  link.rel='icon'; link.type='image/png'; link.href=c.toDataURL();
  document.head.appendChild(link);
})();
</script>

let nextSet = false;
function renderGrid(filter='all') {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  nextSet = false;
  races.forEach(r => {
    const rDate = new Date(r.raceDate);
    const done = rDate < TODAY;
    const next = !done && !nextSet;
    if (next) nextSet = true;

    let show = true;
    if (filter === 'sprint' && !r.sprint) show = false;
    if (filter === 'upcoming' && done) show = false;
    if (filter === 'done' && !done) show = false;

    const card = document.createElement('div');
    card.className = `race-card${done?' is-done':''}${next?' is-next':''}${r.sprint?' is-sprint':''}${!show?' hidden':''}`;
    card.onclick = () => openModal(r.round - 1);

    const statusBadge = done
      ? `<span class="badge badge-done">Completed</span>`
      : next ? `<span class="badge badge-upcoming">Next Race</span>`
      : r.isNew ? `<span class="badge badge-new">New Circuit</span>`
      : `<span class="badge badge-upcoming">Upcoming</span>`;
    const sprintBadge = r.sprint ? `<span class="badge badge-sprint" style="margin-left:6px">Sprint</span>` : '';

    card.innerHTML = `
      <div class="card-top">
        <div class="round-num">${r.round}</div>
        <div class="card-title-area">
          <div class="country-flag">${r.flag}</div>
          <div class="race-name">${r.name.replace(' Grand Prix','').replace(' GP','')}</div>
          <div class="race-circuit">${r.circuit}</div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-row">
          <span class="meta-label">Date</span>
          <span class="meta-value">${r.dates}</span>
        </div>
        <div class="card-row">
          <span class="meta-label">Location</span>
          <span class="meta-value">${r.city}</span>
        </div>
        <div class="card-row">
          <div style="display:flex;gap:6px;align-items:center">${statusBadge}${sprintBadge}</div>
          ${r.result ? `<span class="meta-value" style="color:var(--gold);font-size:13px">P1: ${r.result[0].driver}</span>` : ''}
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function filter(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid(type);
}

function openModal(idx) {
  const r = races[idx];
  const rDate = new Date(r.raceDate);
  const done = rDate < TODAY;

  document.getElementById('modal-header').innerHTML = `
    <div class="modal-flag">${r.flag}</div>
    <div>
      <div class="modal-round">Round ${r.round} · ${r.country}</div>
      <div class="modal-title">${r.name.replace(' Grand Prix', '<br><span>Grand Prix</span>')}</div>
      <div class="modal-circuit">${r.circuit} · ${r.city}</div>
    </div>
  `;

  let body = '';

  // Sessions
  body += `<div class="modal-section"><div class="modal-section-title">Weekend Schedule</div>`;
  r.sessions.forEach(s => {
    body += `<div class="session-row"><span class="session-name">${s.n}</span><span class="session-date">${s.d}</span></div>`;
  });
  body += `</div>`;

  // Details
  body += `<div class="modal-section"><div class="modal-section-title">Circuit Details</div><div class="detail-grid">`;
  if(r.details.laps) body += `<div class="detail-item"><div class="dl">Laps</div><div class="dv">${r.details.laps}</div></div>`;
  body += `<div class="detail-item"><div class="dl">Distance</div><div class="dv">${r.details.distance}</div></div>`;
  body += `<div class="detail-item"><div class="dl">Lap Length</div><div class="dv">${r.details.lap}</div></div>`;
  if(r.details.turns) body += `<div class="detail-item"><div class="dl">Turns</div><div class="dv">${r.details.turns}</div></div>`;
  if(r.sprint) body += `<div class="detail-item detail-full"><div class="dl">Format</div><div class="dv" style="color:var(--sprint)">Sprint Weekend</div></div>`;
  body += `</div></div>`;

  // Result
  if (r.result) {
    body += `<div class="modal-section"><div class="modal-section-title">Race Result (Top 3)</div>`;
    r.result.forEach(res => {
      body += `<div class="result-row"><div class="pos p${res.pos}">${res.pos}</div><div class="driver-name">${res.driver} <span style="color:var(--muted);font-weight:400;font-size:12px">${res.team}</span></div><div class="result-time">${res.time}</div></div>`;
    });
    body += `</div>`;
  }

  // Fact
  body += `<div class="modal-section"><div class="modal-section-title">About this race</div><div class="fact-box">${r.fact}</div></div>`;

  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('overlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('overlay') || e.target.classList.contains('close-btn')) {
    document.getElementById('overlay').classList.remove('open');
  }
}

document.addEventListener('keydown', e => { if(e.key === 'Escape') closeModal({target:document.getElementById('overlay')}); });

renderGrid();
</script>

function renderTeams() {
  const grid = document.getElementById('teams-grid');
  grid.innerHTML = '';
  teams.forEach(t => {
    const card = document.createElement('div');
    card.className = 'team-card';
    const tagMap = { champ:'🏆 Champion', rookie:'★ Rookie', return:'↩ Return' };
    const tagClass = { champ:'tag-champ', rookie:'tag-rookie', return:'tag-return' };
    card.innerHTML = `
      <div class="team-header">
        <div class="team-color-bar" style="background:${t.color}"></div>
        <div class="team-header-info">
          <div class="team-name">${t.name}</div>
          <div class="team-engine">${t.engine}</div>
        </div>
        ${t.isNew ? '<div class="team-badge-area"><span class="team-new-badge">New Team</span></div>' : ''}
      </div>
      <div class="drivers-row">
        ${t.drivers.map(d => `
          <div class="driver-cell">
            <div class="driver-num" style="color:${t.color}">${d.num}</div>
            <div class="driver-name-full">${d.first}<br>${d.last}</div>
            <div class="driver-country">${d.nat}</div>
            ${d.tags.map(tag => `<span class="driver-tag ${tagClass[tag]}">${tagMap[tag]}</span>`).join('')}
          </div>
        `).join('')}
      </div>
      <div style="padding:12px 16px;border-top:1px solid var(--border);font-size:12px;color:var(--muted);line-height:1.6">${t.info}</div>
    `;
    grid.appendChild(card);
  });
}

function showSection(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('visible'));
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('section-' + name).classList.add('visible');
  btn.classList.add('active');
}

renderTeams();
</script>
